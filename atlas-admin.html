<!DOCTYPE html>
<html>
<head>
  <title>Atlas Labs - Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial; background: #0a0e27; color: #e0e0e0; padding: 20px; max-width: 800px; margin: 0 auto; }
    h1 { color: #00ff88; margin-bottom: 20px; }
    h2 { color: #00ff88; margin-bottom: 15px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { display: none; }
    .tab.active { display: block; }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px 0;
      background: #1a2f5a;
      color: #e0e0e0;
      border: 1px solid #00ff88;
      border-radius: 5px;
      font-size: 16px;
      font-family: Arial;
    }
    textarea { min-height: 100px; resize: vertical; }
    label { color: #00ff88; font-weight: bold; font-size: 13px; }
    .btn { padding: 12px 24px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
    .btn-green { background: #00ff88; color: #000; }
    .btn-blue { background: #0066ff; color: #fff; }
    .btn-red { background: #ff3366; color: #fff; }
    .btn:hover { opacity: 0.85; }
    .alert { padding: 12px; margin: 10px 0; border-radius: 5px; font-weight: bold; display: none; }
    .alert.show { display: block; }
    .success { background: rgba(0,255,136,0.15); border: 1px solid #00ff88; color: #00ff88; }
    .error { background: rgba(255,51,102,0.15); border: 1px solid #ff3366; color: #ff6688; }
    .card { border: 1px solid #00ff88; padding: 15px; margin: 10px 0; border-radius: 8px; background: #1a2f5a; }
    .card-name { color: #00ff88; font-size: 18px; font-weight: bold; }
    .card-cat { color: #aaa; font-size: 13px; margin: 5px 0; }
    .card-desc { font-size: 13px; margin: 8px 0; }
    .status { padding: 8px 12px; border-radius: 5px; margin-bottom: 20px; }
    .connected { background: rgba(0,255,136,0.15); border: 1px solid #00ff88; color: #00ff88; }
  </style>
</head>
<body>

<h1>⚡ ATLAS LABS - ADMIN</h1>

<div class="status connected" id="status">🔄 Connecting to database...</div>

<div class="tabs">
  <button class="btn btn-green" onclick="showTab('add')">➕ Add Product</button>
  <button class="btn btn-blue" onclick="showTab('list')">📋 All Products</button>
</div>

<div id="msg" class="alert"></div>

<!-- ADD PRODUCT -->
<div id="add" class="tab active">
  <h2>Add New Product</h2>
  <form onsubmit="addProduct(event)">
    <label>Product Name *</label>
    <input type="text" id="pName" placeholder="e.g., Retatrutide" required>

    <label>Category *</label>
    <input type="text" id="pCategory" placeholder="e.g., GLP-1 Receptor Agonist" required>

    <label>Quantity</label>
    <input type="text" id="pQuantity" placeholder="e.g., 10mg">

    <label>Purity</label>
    <input type="text" id="pPurity" placeholder="e.g., 99% purity lyophilized powder">

    <label>Cycle Length</label>
    <input type="text" id="pCycle" placeholder="e.g., 12-16 Weeks">

    <label>Clinical Results</label>
    <input type="text" id="pResults" placeholder="e.g., >20% Reduction">

    <label>Description *</label>
    <textarea id="pDesc" placeholder="Enter full product description..." required></textarea>

    <label>Product Image URL</label>
    <input type="url" id="pImage" placeholder="https://example.com/image.jpg">

    <label><input type="checkbox" id="pFeatured"> Mark as Featured Product</label>

    <br><br>
    <button type="submit" class="btn btn-green">✨ Create Product</button>
  </form>
</div>

<!-- ALL PRODUCTS -->
<div id="list" class="tab">
  <h2>All Products</h2>
  <button class="btn btn-blue" onclick="loadProducts()">🔄 Refresh</button>
  <div id="productsList" style="margin-top: 15px;"></div>
</div>

<script>
  // ✅ SUPABASE ALREADY CONNECTED - NO SETUP NEEDED
  const SUPABASE_URL = 'https://sbaiztnkunfrcvqfuhbn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiYWl6dG5rdW5mcmN2cWZ1aGJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MTU5NzcsImV4cCI6MjA5Njk5MTk3N30.HWpee_oUvsG6OHOz-qpTU2SpJ0zJ6Womo9H57MUXsZw';

  const { createClient } = window.supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Test connection on load
  window.addEventListener('load', async () => {
    try {
      const { error } = await db.from('products').select('count');
      if (error) throw error;
      document.getElementById('status').textContent = '✅ Connected to Supabase!';
    } catch (err) {
      document.getElementById('status').textContent = '❌ Connection failed: ' + err.message;
      document.getElementById('status').className = 'status error';
    }
  });

  // Show tab
  function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(name).classList.add('active');
    if (name === 'list') loadProducts();
  }

  // Show message
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'alert show ' + type;
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  // Add product
  async function addProduct(e) {
    e.preventDefault();

    const data = {
      product_name: document.getElementById('pName').value,
      category: document.getElementById('pCategory').value,
      quantity: document.getElementById('pQuantity').value,
      purity: document.getElementById('pPurity').value,
      cycle_length: document.getElementById('pCycle').value,
      clinical_results: document.getElementById('pResults').value,
      description: document.getElementById('pDesc').value,
      product_image: document.getElementById('pImage').value,
      featured: document.getElementById('pFeatured').checked
    };

    try {
      const { error } = await db.from('products').insert([data]);
      if (error) throw error;
      showMsg('✅ Product added successfully!', 'success');
      e.target.reset();
    } catch (err) {
      showMsg('❌ Error: ' + err.message, 'error');
    }
  }

  // Load products
  async function loadProducts() {
    const list = document.getElementById('productsList');
    list.innerHTML = '<p>Loading...</p>';

    try {
      const { data, error } = await db.from('products').select('*').order('id', { ascending: false });
      if (error) throw error;

      if (!data || data.length === 0) {
        list.innerHTML = '<p>No products yet. Add your first one!</p>';
        return;
      }

      list.innerHTML = data.map(p => `
        <div class="card">
          <div class="card-name">${p.product_name}</div>
          <div class="card-cat">${p.category} ${p.featured ? '⭐ Featured' : ''}</div>
          <div class="card-desc">${(p.description || '').substring(0, 100)}...</div>
          <small style="color:#aaa;">Qty: ${p.quantity || '-'} | Purity: ${p.purity || '-'} | Cycle: ${p.cycle_length || '-'}</small>
          <br>
          <button class="btn btn-red" onclick="deleteProduct(${p.id})" style="margin-top: 10px; padding: 6px 12px; font-size: 12px;">🗑️ Delete</button>
        </div>
      `).join('');
    } catch (err) {
      showMsg('❌ Error loading: ' + err.message, 'error');
    }
  }

  // Delete product
  async function deleteProduct(id) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    try {
      const { error } = await db.from('products').delete().eq('id', id);
      if (error) throw error;
      showMsg('✅ Product deleted!', 'success');
      loadProducts();
    } catch (err) {
      showMsg('❌ Error: ' + err.message, 'error');
    }
  }
</script>

</body>
</html>
